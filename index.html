<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人主页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 欢迎弹窗 -->
  <div class="welcome-overlay" id="welcomeOverlay">
    <div class="welcome-modal">
      <div class="welcome-icon">👋</div>
      <h2>欢迎来到我的主页！</h2>
      <p>很高兴在这里遇见你，随便逛逛吧~</p>
      <button class="welcome-btn" id="welcomeClose">开始探索</button>
    </div>
  </div>

  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="#" class="nav-logo">MyHome</a>
      <div class="nav-links">
        <a href="#about">关于我</a>
        <a href="#projects">项目</a>
        <a href="#contact">联系</a>
      </div>
    </div>
  </nav>

  <!-- Hero 区域 -->
  <section class="hero" id="about">
    <div class="hero-content animate-on-scroll">
      <button class="hero-edit-btn" id="heroEditBtn" title="编辑个人简介">✎</button>
      <div class="avatar-wrapper">
        <img
          src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23e8dfd0' width='100' height='100'/%3E%3Ctext x='50' y='55' text-anchor='middle' fill='%23c4a882' font-size='40' font-family='sans-serif'%3E👤%3C/text%3E%3C/svg%3E"
          alt="头像"
          class="avatar"
          id="avatarImg"
        >
        <span class="avatar-heart">💕</span>
        <img
          src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23e8dfd0' width='100' height='100'/%3E%3Ctext x='50' y='55' text-anchor='middle' fill='%23c4a882' font-size='40' font-family='sans-serif'%3E👤%3C/text%3E%3C/svg%3E"
          alt="女朋友头像"
          class="avatar avatar-gf"
          id="gfAvatarImg"
        >
      </div>
      <h1 class="hero-name">你的昵称</h1>
      <p class="hero-tagline">一个热爱技术的大学生 · 持续学习中</p>
      <div class="hero-meta" id="heroMeta"></div>
    </div>
  </section>

  <!-- 项目展示区 -->
  <section class="projects" id="projects">
    <div class="section-header animate-on-scroll">
      <h2>我的项目</h2>
      <p>记录一些自己折腾过的东西</p>
    </div>
    <div class="projects-grid" id="projectsGrid">
      <!-- 由 JS 动态渲染 -->
    </div>
    <div class="add-project-wrapper animate-on-scroll">
      <button class="add-project-btn" id="addProjectBtn">+ 添加项目</button>
    </div>
  </section>

  <!-- 项目编辑弹窗 -->
  <div class="modal-overlay hidden" id="projectModal">
    <div class="modal-card">
      <h3 id="modalTitle">添加项目</h3>
      <div class="modal-field">
        <label>项目名称</label>
        <input type="text" id="projName" placeholder="给项目起个名字">
      </div>
      <div class="modal-field">
        <label>项目描述</label>
        <textarea id="projDesc" rows="3" placeholder="简单介绍一下这个项目"></textarea>
      </div>
      <div class="modal-field">
        <label>技术标签 <small>(用逗号分隔)</small></label>
        <input type="text" id="projTags" placeholder="React, Node.js, ...">
      </div>
      <div class="modal-field">
        <label>项目链接 <small>(选填)</small></label>
        <input type="text" id="projLink" placeholder="https://github.com/xxx">
      </div>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="modalCancel">取消</button>
        <button class="modal-btn confirm" id="modalConfirm">确定</button>
      </div>
    </div>
  </div>

  <!-- 密码验证弹窗 -->
  <div class="modal-overlay hidden" id="authModal">
    <div class="modal-card modal-auth">
      <h3>需要密码</h3>
      <p class="auth-hint">修改内容需要验证密码</p>
      <div class="modal-field">
        <input type="password" id="authPassword" placeholder="请输入管理密码" autocomplete="off">
      </div>
      <p class="auth-error hidden" id="authError">密码错误，请重试</p>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="authCancel">取消</button>
        <button class="modal-btn confirm" id="authConfirm">确认</button>
      </div>
    </div>
  </div>

  <!-- 个人简介编辑弹窗 -->
  <div class="modal-overlay hidden" id="profileModal">
    <div class="modal-card">
      <h3>编辑个人简介</h3>
      <div class="modal-field">
        <label>昵称</label>
        <input type="text" id="profileNickname" placeholder="你的昵称">
      </div>
      <div class="modal-field">
        <label>标签语</label>
        <input type="text" id="profileTagline" placeholder="一句话介绍自己">
      </div>
      <div class="modal-field">
        <label>性别</label>
        <input type="text" id="profileGender" placeholder="例如：男生">
      </div>
      <div class="modal-field">
        <label>女朋友</label>
        <input type="text" id="profileGirlfriend" placeholder="她的昵称">
      </div>
      <div class="modal-field">
        <label>头像URL <small>(选填)</small></label>
        <input type="text" id="profileAvatar" placeholder="图片链接或本地路径">
      </div>
      <div class="modal-field">
        <label>女朋友头像URL <small>(选填)</small></label>
        <input type="text" id="profileGfAvatar" placeholder="图片链接或本地路径">
      </div>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="profileCancel">取消</button>
        <button class="modal-btn confirm" id="profileConfirm">确定</button>
      </div>
    </div>
  </div>

  <!-- 角落管理锁 -->
  <button class="auth-lock" id="authLock" title="管理登录">🔒</button>

  <!-- 社交媒体区 -->
  <section class="social" id="contact">
    <div class="section-header animate-on-scroll">
      <h2>找到我</h2>
      <p>欢迎来这些地方串门</p>
    </div>
    <div class="social-links" id="socialLinks">
      <!-- 由 JS 动态渲染 -->
    </div>
  </section>

  <!-- 页脚 -->
  <footer class="footer">
    <p>&copy; 2026 MyHome. Made with ❤️</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
